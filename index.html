<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilachala Kitchen — Order Online</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══ NAV ══════════════════════════════════════════════ -->
  <nav>
    <a class="nav-brand" href="#">
      <div id="nav-logo-slot"></div>
      <div>
        <div class="nav-name" id="nav-name"></div>
        <div class="nav-sub"  id="nav-sub"></div>
      </div>
    </a>

    <div class="nav-cats" id="nav-cats"></div>

    <button class="cart-btn" onclick="openCart()">
      <span class="cart-icon">🛒</span>
      <span>Cart</span>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </nav>

  <!-- ══ HERO ══════════════════════════════════════════════ -->
  <div class="hero">
    <div id="hero-logo-slot"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p  class="hero-sub"   id="hero-sub"></p>
    <div class="hero-tags" id="hero-tags"></div>
  </div>

  <!-- ══ MAIN ══════════════════════════════════════════════ -->
  <div class="main">

    <!-- Order Type -->
    <div class="order-type-row" id="order-type-row"></div>

    <!-- Menu sections rendered by JS -->
    <div id="menu-root"></div>

  </div>

  <!-- ══ ITEM MODAL ════════════════════════════════════════ -->
  <div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2 class="modal-item-name" id="modalName"></h2>
      <p  class="modal-item-desc" id="modalDesc"></p>
      <div id="modalCustomise"></div>
      <div class="modal-qty-row">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-num" id="modalQty">1</div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <div class="modal-total" id="modalTotal">$0</div>
      </div>
      <button class="add-to-cart-btn" onclick="addToCart()">
        <span>Add to Cart</span>
        <span id="modalBtnPrice"></span>
      </button>
    </div>
  </div>

  <!-- ══ CART DRAWER ═══════════════════════════════════════ -->
  <div class="cart-bg" id="cartBg" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <span class="cart-title">Your Order</span>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-subtotal">
        <span class="cart-subtotal-label">Subtotal</span>
        <span class="cart-subtotal-val" id="cartSubtotal">$0</span>
      </div>
      <div class="cart-subtotal">
        <span class="cart-subtotal-label" id="taxLabel">Taxes &amp; charges</span>
        <span class="cart-subtotal-val" id="cartTax">$0</span>
      </div>
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-val" id="cartTotal">$0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Place Order →</button>
    </div>
  </div>

  <!-- ══ TOAST ═════════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <!-- ══ SCRIPTS (order matters) ═══════════════════════════ -->
  <script src="data/config.js"></script>
  <script src="data/menu.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
