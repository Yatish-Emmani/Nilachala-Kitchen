<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilachala Kitchen — Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
:root {
  --olive:      #3E3C10;
  --olive-mid:  #5A5820;
  --gold:       #8A7A30;
  --gold-lt:    #B0A055;
  --gold-pale:  #D4C87A;
  --parchment:  #F5EED8;
  --cream:      #FAF5E4;
  --warm-white: #FFFDF5;
  --border:     #C8BC8A;
  --muted:      #8A8470;
  --spice:      #B03A1A;
  --leaf:       #3E6B30;
  --shadow:     rgba(62,60,16,0.14);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--warm-white);
  color:var(--olive);
  font-family:'Source Serif 4',Georgia,serif;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(62,60,16,.02) 30px,rgba(62,60,16,.02) 31px),
    repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(62,60,16,.012) 30px,rgba(62,60,16,.012) 31px);
  pointer-events:none;z-index:0;
}

/* ══ NAV ══ */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--olive);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:60px;
  box-shadow:0 2px 16px rgba(0,0,0,.25);
}
.nav-brand{
  display:flex;align-items:center;gap:12px;
  text-decoration:none;
}
.nav-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold-lt);}
.nav-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:.12em;color:var(--parchment);text-transform:uppercase;}
.nav-sub{font-size:9px;letter-spacing:.28em;color:var(--gold-lt);text-transform:uppercase;line-height:1;}

.nav-cats{
  display:flex;gap:4px;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.nav-cats::-webkit-scrollbar{display:none;}
.cat-btn{
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:rgba(245,238,216,.6);
  background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:2px;
  white-space:nowrap;transition:color .2s,background .2s;
}
.cat-btn:hover,.cat-btn.active{color:var(--parchment);background:rgba(245,238,216,.1);}

.cart-btn{
  position:relative;background:var(--gold);border:none;cursor:pointer;
  padding:8px 16px;border-radius:3px;
  display:flex;align-items:center;gap:8px;
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.1em;color:var(--olive);text-transform:uppercase;
  transition:background .2s,transform .1s;flex-shrink:0;
}
.cart-btn:hover{background:var(--gold-pale);}
.cart-btn:active{transform:scale(.97);}
.cart-count{
  background:var(--spice);color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.cart-icon{font-size:16px;}

/* ══ HERO ══ */
.hero{
  position:relative;z-index:1;
  background:linear-gradient(135deg,var(--olive) 0%,#2A2808 60%,#1A1804 100%);
  text-align:center;padding:52px 24px 44px;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(176,160,85,.12) 0%,transparent 70%);
}
.hero-logo{
  width:120px;height:120px;object-fit:contain;margin-bottom:16px;
  filter:drop-shadow(0 4px 20px rgba(176,160,85,.4));
  position:relative;z-index:1;
  border-radius:50%;
}
.hero-title{
  font-family:'Oswald',sans-serif;font-size:clamp(26px,5vw,38px);
  font-weight:700;letter-spacing:.18em;color:var(--parchment);
  text-transform:uppercase;position:relative;z-index:1;margin-bottom:4px;
}
.hero-sub{
  font-family:'Source Serif 4',serif;font-style:italic;
  font-size:14px;color:var(--gold-lt);letter-spacing:.06em;
  position:relative;z-index:1;margin-bottom:18px;
}
.hero-tags{
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
  position:relative;z-index:1;
}
.hero-tag{
  font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(245,238,216,.5);
  border:1px solid rgba(245,238,216,.2);padding:4px 12px;border-radius:20px;
}

/* ══ LAYOUT ══ */
.main{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:32px 24px 100px;}

/* ══ SECTION ══ */
.section{margin-bottom:48px;}
.section-head{
  display:flex;align-items:center;gap:16px;
  margin-bottom:20px;padding-bottom:12px;
  border-bottom:2px solid var(--border);
}
.section-icon{font-size:22px;flex-shrink:0;}
.section-title{
  font-family:'Oswald',sans-serif;font-size:clamp(16px,3vw,20px);
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--olive);
}
.section-sub{
  font-family:'Source Serif 4',serif;font-style:italic;
  font-size:12px;color:var(--muted);letter-spacing:.04em;margin-top:1px;
}

/* ══ CARDS GRID ══ */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:16px;
}

/* ══ ITEM CARD ══ */
.card{
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:8px;
  padding:18px;
  display:flex;flex-direction:column;
  gap:10px;
  transition:box-shadow .2s,border-color .2s,transform .15s;
  cursor:pointer;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold-lt));
  transform:scaleX(0);transform-origin:left;transition:transform .25s;
}
.card:hover{
  box-shadow:0 6px 24px var(--shadow);
  border-color:var(--gold);transform:translateY(-2px);
}
.card:hover::before{transform:scaleX(1);}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-name{
  font-family:'Libre Baskerville',serif;font-weight:700;
  font-size:clamp(13px,2vw,15px);color:var(--olive);line-height:1.3;
  flex:1;
}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}
.badge{
  font-size:9px;font-family:'Oswald',sans-serif;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:20px;
}
.badge-spice{background:rgba(176,58,26,.12);color:var(--spice);border:1px solid rgba(176,58,26,.25);}
.badge-hot{background:rgba(176,58,26,.18);color:#9A2010;border:1px solid rgba(176,58,26,.35);}
.badge-green{background:rgba(62,107,48,.1);color:var(--leaf);border:1px solid rgba(62,107,48,.25);}

.card-desc{
  font-size:12px;color:var(--muted);line-height:1.55;font-weight:300;
  flex:1;
}

.card-sub-note{
  font-family:'Source Serif 4',serif;font-style:italic;
  font-size:11px;color:var(--gold);letter-spacing:.02em;
}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.card-price{
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;
  color:var(--olive);letter-spacing:.04em;
}
.card-price span{font-size:11px;font-weight:400;color:var(--muted);}

.add-btn{
  background:var(--olive);color:var(--parchment);
  border:none;cursor:pointer;
  padding:8px 16px;border-radius:4px;
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  transition:background .2s,transform .1s;
  display:flex;align-items:center;gap:6px;
}
.add-btn:hover{background:var(--olive-mid);}
.add-btn:active{transform:scale(.96);}
.add-btn .plus{font-size:15px;line-height:1;}

/* ══ MODAL ══ */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(30,28,6,.55);backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
.modal-bg.open{display:flex;}
@media(min-width:600px){.modal-bg{align-items:center;}}

.modal{
  background:var(--warm-white);
  border-radius:16px 16px 0 0;
  width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  padding:28px 24px 32px;
  animation:slideUp .28s ease;
  position:relative;
}
@media(min-width:600px){.modal{border-radius:12px;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.modal-close{
  position:absolute;top:16px;right:16px;
  background:rgba(62,60,16,.08);border:none;cursor:pointer;
  width:32px;height:32px;border-radius:50%;
  font-size:18px;color:var(--olive);
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.modal-close:hover{background:rgba(62,60,16,.16);}

.modal-item-name{
  font-family:'Libre Baskerville',serif;font-weight:700;
  font-size:20px;color:var(--olive);margin-bottom:4px;padding-right:36px;
}
.modal-item-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:20px;}

.customise-section{margin-bottom:20px;}
.customise-label{
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.customise-required{
  font-size:9px;background:var(--spice);color:#fff;
  padding:2px 6px;border-radius:10px;letter-spacing:.05em;
}
.customise-optional{
  font-size:9px;background:var(--leaf);color:#fff;
  padding:2px 6px;border-radius:10px;letter-spacing:.05em;
}

.opt-list{display:flex;flex-direction:column;gap:6px;}
.opt-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:6px;
  border:1.5px solid var(--border);
  cursor:pointer;transition:border-color .15s,background .15s;
  user-select:none;
}
.opt-item:hover{border-color:var(--gold);background:rgba(176,160,85,.06);}
.opt-item.selected{border-color:var(--olive);background:rgba(62,60,16,.06);}
.opt-check{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,background .15s;
}
.opt-item.selected .opt-check{border-color:var(--olive);background:var(--olive);}
.opt-check-inner{width:8px;height:8px;border-radius:50%;background:#fff;display:none;}
.opt-item.selected .opt-check-inner{display:block;}
.opt-check.square{border-radius:3px;}
.opt-item.selected .opt-check.square{background:var(--olive);border-color:var(--olive);}
.opt-check.square .opt-check-inner{display:none;}
.opt-item.selected .opt-check.square::after{content:'✓';color:#fff;font-size:11px;font-weight:700;}
.opt-label{flex:1;font-size:13px;color:var(--olive);}
.opt-extra{font-size:11px;color:var(--muted);font-style:italic;}
.opt-price{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;color:var(--gold);margin-left:auto;}

/* qty row in modal */
.modal-qty-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.qty-ctrl{display:flex;align-items:center;gap:0;}
.qty-btn{
  background:var(--parchment);border:1.5px solid var(--border);
  width:34px;height:34px;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  color:var(--olive);transition:background .15s;
}
.qty-btn:first-child{border-radius:4px 0 0 4px;}
.qty-btn:last-child{border-radius:0 4px 4px 0;}
.qty-btn:hover{background:var(--border);}
.qty-num{
  width:40px;height:34px;border:1.5px solid var(--border);border-left:none;border-right:none;
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--olive);
}
.modal-total{
  font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--olive);
}

.add-to-cart-btn{
  width:100%;background:var(--olive);color:var(--parchment);
  border:none;cursor:pointer;padding:14px;border-radius:6px;
  font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;
  transition:background .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.add-to-cart-btn:hover{background:var(--olive-mid);}
.add-to-cart-btn:active{transform:scale(.98);}

/* ══ CART DRAWER ══ */
.cart-bg{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(30,28,6,.5);backdrop-filter:blur(3px);
}
.cart-bg.open{display:block;}

.cart-drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:301;
  width:min(380px,100vw);
  background:var(--warm-white);
  box-shadow:-4px 0 32px rgba(0,0,0,.2);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .28s ease;
}
.cart-drawer.open{transform:translateX(0);}

.cart-header{
  background:var(--olive);padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.cart-title{
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:.14em;color:var(--parchment);text-transform:uppercase;
}
.cart-close{
  background:none;border:none;cursor:pointer;
  color:var(--parchment);font-size:22px;
  display:flex;align-items:center;justify-content:center;
  opacity:.8;transition:opacity .2s;
}
.cart-close:hover{opacity:1;}

.cart-items{flex:1;overflow-y:auto;padding:16px 20px;}

.cart-empty{
  text-align:center;padding:60px 20px;
  font-family:'Source Serif 4',serif;font-style:italic;
  color:var(--muted);font-size:14px;line-height:1.6;
}
.cart-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4;}

.cart-item{
  display:flex;gap:12px;padding:14px 0;
  border-bottom:1px dashed rgba(62,60,16,.12);
}
.cart-item:last-child{border-bottom:none;}
.ci-info{flex:1;}
.ci-name{
  font-family:'Libre Baskerville',serif;font-weight:700;
  font-size:13px;color:var(--olive);margin-bottom:3px;
}
.ci-customs{font-size:11px;color:var(--muted);line-height:1.4;}
.ci-ctrl{display:flex;align-items:center;gap:6px;margin-top:6px;}
.ci-qty-btn{
  background:var(--parchment);border:1px solid var(--border);
  width:24px;height:24px;border-radius:3px;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  color:var(--olive);transition:background .15s;
}
.ci-qty-btn:hover{background:var(--border);}
.ci-qty{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;
  width:24px;text-align:center;color:var(--olive);
}
.ci-remove{
  background:none;border:none;cursor:pointer;
  color:var(--spice);font-size:11px;margin-left:4px;
  font-family:'Source Serif 4',serif;text-decoration:underline;
}
.ci-price{
  font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;
  color:var(--olive);align-self:flex-start;white-space:nowrap;
}

.cart-footer{
  border-top:2px solid var(--border);padding:20px;
  background:var(--cream);
}
.cart-subtotal{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
.cart-subtotal-label{font-size:13px;color:var(--muted);}
.cart-subtotal-val{
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--olive);
}
.cart-total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:10px;border-top:1px solid var(--border);margin-bottom:16px;
}
.cart-total-label{
  font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--olive);font-weight:600;
}
.cart-total-val{
  font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--olive);
}
.checkout-btn{
  width:100%;background:var(--gold);color:var(--olive);
  border:none;cursor:pointer;padding:14px;border-radius:6px;
  font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;
  transition:background .2s;
}
.checkout-btn:hover{background:var(--gold-pale);}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--olive);color:var(--parchment);
  padding:12px 24px;border-radius:6px;
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  z-index:400;transition:transform .3s,opacity .3s;opacity:0;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ══ ORDER TYPE ══ */
.order-type-row{
  display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap;
}
.order-type-btn{
  flex:1;min-width:120px;
  border:2px solid var(--border);background:var(--cream);
  border-radius:8px;padding:14px 10px;cursor:pointer;
  text-align:center;transition:border-color .2s,background .2s;
}
.order-type-btn.active{border-color:var(--olive);background:rgba(62,60,16,.05);}
.order-type-btn:hover{border-color:var(--gold);}
.ot-icon{font-size:22px;margin-bottom:4px;}
.ot-label{
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--olive);
}
.ot-sub{font-size:11px;color:var(--muted);margin-top:2px;}

@media(max-width:560px){
  nav{padding:0 12px;}
  .nav-cats{display:none;}
  .main{padding:20px 14px 80px;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="#">
    <img class="nav-logo" src="NilaChala.png" alt="Nilachala logo" onerror="this.style.display='none'">
    <div>
      <div class="nav-name">Nilachala Kitchen</div>
      <div class="nav-sub">Dakshin Bites</div>
    </div>
  </a>
  <div class="nav-cats">
    <button class="cat-btn active" onclick="scrollToSection('idlis', this)">Idlis</button>
    <button class="cat-btn" onclick="scrollToSection('dosas', this)">Dosas</button>
    <button class="cat-btn" onclick="scrollToSection('pesarattu', this)">Pesarattu</button>
    <button class="cat-btn" onclick="scrollToSection('attu', this)">Attu</button>
    <button class="cat-btn" onclick="scrollToSection('health', this)">Health</button>
    <button class="cat-btn" onclick="scrollToSection('bites', this)">Bites</button>
    <button class="cat-btn" onclick="scrollToSection('rice', this)">Rice</button>
    <button class="cat-btn" onclick="scrollToSection('drinks', this)">Drinks</button>
  </div>
  <button class="cart-btn" onclick="openCart()">
    <span class="cart-icon">🛒</span>
    <span>Cart</span>
    <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<!-- HERO -->
<div class="hero">
  <img class="hero-logo" src="NilaChala.png" alt="Nilachala Kitchen" onerror="this.style.display='none'">
  <h1 class="hero-title">Nilachala Kitchen</h1>
  <p class="hero-sub">Authentic Dakshin Bites · Made with Fresh Ingrediants</p>
  <div class="hero-tags">
    <span class="hero-tag">South Indian</span>
    <span class="hero-tag">Andhra Flavours</span>
    <span class="hero-tag">Traditional Recipes</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SECTIONS rendered by JS -->
  <div id="menu-root"></div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 class="modal-item-name" id="modalName"></h2>
    <p class="modal-item-desc" id="modalDesc"></p>
    <div id="modalCustomise"></div>
    <div class="modal-qty-row">
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>

let cart = [];

let activeQty = 1;

// ── RENDER MENU ───────────────────────────────────────────────────────────────
function renderMenu() {
  const root = document.getElementById('menu-root');
  root.innerHTML = MENU.map(sec => `
    <div class="section" id="${sec.id}">
      <div class="section-head">
        <span class="section-icon">${sec.icon}</span>
        <div>
          <div class="section-title">${sec.title}</div>
          <div class="section-sub">${sec.sub}</div>
        </div>
      </div>
      <div class="cards">
        ${sec.items.map(item => renderCard(item)).join('')}
      </div>
    </div>
  `).join('');
}

function badgeHTML(badges=[]) {
  return (badges||[]).map(b => {
    if(b==='spice') return `<span class="badge badge-spice">🌶 Spicy</span>`;
    if(b==='hot')   return `<span class="badge badge-hot">🔥 Fiery</span>`;
    if(b==='green') return `<span class="badge badge-green">🌱 Healthy</span>`;
    return '';
  }).join('');
}

function renderCard(item) {
  return `
  <div class="card" onclick="openModal('${item.id}')">
    <div class="card-top">
      <p class="card-name">${item.name}</p>
      <div class="card-badges">${badgeHTML(item.badges)}</div>
    </div>
    <p class="card-desc">${item.desc}</p>
    ${item.note ? `<p class="card-sub-note">${item.note}</p>` : ''}
    <div class="card-footer">
      <p class="card-price">₹${item.price} <span>onwards</span></p>
      <button class="add-btn" onclick="event.stopPropagation();openModal('${item.id}')">
        <span class="plus">+</span> Add
      </button>
    </div>
  </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function findItem(id) {
  for(const s of MENU) {
    const found = s.items.find(i=>i.id===id);
    if(found) return found;
  }
  return null;
}

function openModal(itemId) {
  const item = findItem(itemId);
  if(!item) return;
  activeItem = item;
  activeQty = 1;
  activeSelections = {};

  // init defaults
  (item.customise||[]).forEach(group => {
    const defaults = group.options.filter(o=>o.default).map(o=>o.label);
    if(group.type==='radio') {
      const def = group.options.find(o=>o.default);
      activeSelections[group.id] = def ? def.label : group.options[0].label;
    } else {
      activeSelections[group.id] = new Set(defaults);
    }
  });

  document.getElementById('modalName').textContent = item.name;
  document.getElementById('modalDesc').textContent = item.desc;
  renderCustomise(item);
  updateModalTotal();
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow='';
}

function handleModalBgClick(e) {
  if(e.target === document.getElementById('modalBg')) closeModal();
}

function renderCustomise(item) {
  const el = document.getElementById('modalCustomise');
  el.innerHTML = (item.customise||[]).map(group => `
    <div class="customise-section">
      <div class="customise-label">
        ${group.label}
        ${group.required ? '<span class="customise-required">Required</span>' : '<span class="customise-optional">Optional</span>'}
      </div>
      <div class="opt-list">
        ${group.options.map(opt => renderOption(group, opt)).join('')}
      </div>
    </div>
  `).join('');
}

function renderOption(group, opt) {
  const isSelected = group.type==='radio'
    ? activeSelections[group.id] === opt.label
    : (activeSelections[group.id]||new Set()).has(opt.label);

  const checkClass = group.type==='radio' ? '' : 'square';
  const selectedClass = isSelected ? 'selected' : '';
  const safeLabel = opt.label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const onclick = group.type==='radio'
    ? `selectRadio('${group.id}','${safeLabel}',${opt.price})`
    : `toggleCheck('${group.id}','${safeLabel}',${opt.price})`;

  return `
    <div class="opt-item ${selectedClass}" onclick="${onclick}">
      <div class="opt-check ${checkClass}">
        <div class="opt-check-inner"></div>
      </div>
      <span class="opt-label">${opt.label}</span>
      ${opt.price ? `<span class="opt-price">+₹${opt.price}</span>` : ''}
    </div>
  `;
}

function selectRadio(groupId, label, price) {
  activeSelections[groupId] = label;
  renderCustomise(activeItem);
  updateModalTotal();
}

function toggleCheck(groupId, label, price) {
  if(!activeSelections[groupId]) activeSelections[groupId] = new Set();
  const s = activeSelections[groupId];
  if(s.has(label)) s.delete(label); else s.add(label);
  renderCustomise(activeItem);
  updateModalTotal();
}

function calcItemTotal(item, selections, qty) {
  let total = item.price;
  (item.customise||[]).forEach(group => {
    const sel = selections[group.id];
    if(group.type==='radio') {
      const opt = group.options.find(o=>o.label===sel);
      if(opt) total += opt.price;
    } else if(sel instanceof Set) {
      sel.forEach(label => {
        const opt = group.options.find(o=>o.label===label);
        if(opt) total += opt.price;
      });
    }
  });
  return total * qty;
}

function updateModalTotal() {
  const total = calcItemTotal(activeItem, activeSelections, activeQty);
  document.getElementById('modalTotal').textContent = `₹${total}`;
  document.getElementById('modalQty').textContent = activeQty;
  document.getElementById('modalBtnPrice').textContent = `· ₹${total}`;
}

function changeQty(delta) {
  activeQty = Math.max(1, activeQty + delta);
  updateModalTotal();
}

function addToCart() {
  if(!activeItem) return;
  const total = calcItemTotal(activeItem, activeSelections, activeQty);

  // build summary of customisations
  const customs = [];
  (activeItem.customise||[]).forEach(group => {
    const sel = activeSelections[group.id];
    if(group.type==='radio' && sel) {
      customs.push(sel);
    } else if(sel instanceof Set) {
      sel.forEach(l => customs.push(l));
    }
  });

  // clone selections safely
  const selClone = {};
  Object.entries(activeSelections).forEach(([k,v]) => {
    selClone[k] = v instanceof Set ? new Set(v) : v;
  });

  // Store unit price (without qty) so we can recalculate on qty change
  const unitTotal = calcItemTotal(activeItem, activeSelections, 1);

  cart.push({
    id: Date.now(),
    itemId: activeItem.id,
    name: activeItem.name,
    price: activeItem.price,
    unitTotal: unitTotal,
    qty: activeQty,
    total: total,
    selections: selClone,
    customSummary: customs,
  });

  updateCartUI();
  closeModal();
  showToast(`${activeItem.name} added to cart`);
}

// ── CART ──────────────────────────────────────────────────────────────────────
function openCart() {
  document.getElementById('cartBg').classList.add('open');
  document.getElementById('cartDrawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeCart() {
  document.getElementById('cartBg').classList.remove('open');
  document.getElementById('cartDrawer').classList.remove('open');
  document.body.style.overflow='';
}

function updateCartUI() {
  const count = cart.reduce((a,c)=>a+c.qty,0);
  document.getElementById('cartCount').textContent = count;

  const el = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  if(cart.length===0){
    el.innerHTML=`<div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      Your cart is empty.<br>Add some Dakshin Bites!
    </div>`;
    footer.style.display='none';
    return;
  }

  el.innerHTML = cart.map(ci => `
    <div class="cart-item">
      <div class="ci-info">
        <p class="ci-name">${ci.qty}× ${ci.name}</p>
        <p class="ci-customs">${ci.customSummary.join(' · ')}</p>
        <div class="ci-ctrl">
          <button class="ci-qty-btn" onclick="changeCartQty(${ci.id},-1)">−</button>
          <span class="ci-qty">${ci.qty}</span>
          <button class="ci-qty-btn" onclick="changeCartQty(${ci.id},1)">+</button>
          <button class="ci-remove" onclick="removeCartItem(${ci.id})">Remove</button>
        </div>
      </div>
      <span class="ci-price">₹${ci.total}</span>
    </div>
  `).join('');

  const subtotal = cart.reduce((a,c)=>a+c.total,0);
  const tax = Math.round(subtotal*0.05);
  const total = subtotal + tax;
  document.getElementById('cartSubtotal').textContent=`₹${subtotal}`;
  document.getElementById('cartTax').textContent=`₹${tax}`;
  document.getElementById('cartTotal').textContent=`₹${total}`;
  footer.style.display='block';
}

function changeCartQty(id, delta) {
  const ci = cart.find(c=>c.id===id);
  if(!ci) return;
  ci.qty = Math.max(1, ci.qty + delta);
  // Recalculate total from stored unit price (avoids re-parsing selections)
  ci.total = ci.unitTotal * ci.qty;
  updateCartUI();
}

function removeCartItem(id) {
  cart = cart.filter(c=>c.id!==id);
  updateCartUI();
}

function checkout() {
  if(cart.length===0) return;
  const subtotal = cart.reduce((a,c)=>a+c.total,0);
  const tax = Math.round(subtotal*0.05);
  alert(`🎉 Order placed!\n\nItems: ${cart.reduce((a,c)=>a+c.qty,0)}\nSubtotal: ₹${subtotal}\nTax: ₹${tax}\nTotal: ₹${subtotal+tax}\n\nThank you for ordering from Nilachala Kitchen!`);
  cart=[];
  updateCartUI();
  closeCart();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
// FIX: renamed from scrollTo to avoid conflict with window.scrollTo
function scrollToSection(id, btn) {
  document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setOrderType(el, type) {
  document.querySelectorAll('.order-type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderMenu();
updateCartUI();
</script>
</body>
